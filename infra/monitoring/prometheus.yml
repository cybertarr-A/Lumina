global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: smartcontractgen
    environment: production

scrape_configs:
  # FastAPI backend metrics
  - job_name: "smartcontractgen-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # PostgreSQL exporter (optional)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # Redis exporter (optional)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
